<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password</title>
  <!--[if mso]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
  <style>
    body {
      margin: 0;
      padding: 0;
      word-spacing: normal;
      background-color: #f3f4f6;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
    }
    table {
      border-spacing: 0;
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    td {
      padding: 0;
    }
    img {
      border: 0;
      -ms-interpolation-mode: bicubic;
    }
    a {
      text-decoration: none;
      color: #ea580c;
    }
    .btn:hover {
      background-color: #c2410c !important;
    }
    @media screen and (max-width: 600px) {
      .container {
        width: 100% !important;
        padding: 20px !important;
      }
      .content-padding {
        padding: 24px !important;
      }
    }
  </style>
</head>
<body style="background-color: #f3f4f6; margin: 0; padding: 0;">
  <div role="article" aria-roledescription="email" lang="en" style="background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" style="width: 100%; border: 0; border-spacing: 0; margin: 0; padding: 0;">
      <tr>
        <td align="center" style="padding: 40px 20px;">
          <!-- Card Container -->
          <table role="presentation" class="container" style="width: 500px; border: 0; border-spacing: 0; background-color: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
            
            <!-- Header -->
            <tr>
              <td align="center" style="padding: 32px 0 0 0;">
                <!-- 
                  NOTE: To use your own logo, host the image publicly (e.g. Supabase Storage) and replace the text below with:
                  <img src="YOUR_PUBLIC_LOGO_URL.png" alt="Bachata Calendar" width="150" style="display:block; width:150px; height:auto;">
                -->
                <span style="font-size: 24px; font-weight: 800; color: #ea580c; letter-spacing: -1px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">BACHATA CALENDAR</span>
              </td>
            </tr>

            <!-- Main Body -->
            <tr>
              <td class="content-padding" style="padding: 32px 48px 40px 48px;">
                <table role="presentation" style="width: 100%; border: 0; border-spacing: 0;">
                  
                  <!-- Icon -->
                  <tr>
                    <td align="center" style="padding-bottom: 24px;">
                      <div style="background-color: #fff7ed; width: 64px; height: 64px; border-radius: 50%; display: table; margin: 0 auto;">
                        <span style="display: table-cell; vertical-align: middle; font-size: 28px;">🔐</span>
                      </div>
                    </td>
                  </tr>

                  <!-- Headline -->
                  <tr>
                    <td align="center">
                      <h2 style="color: #111827; font-size: 20px; font-weight: 600; margin: 0 0 16px 0;">Trouble signing in?</h2>
                      <p style="color: #4b5563; font-size: 15px; line-height: 1.6; margin: 0 0 24px 0;">
                        We received a request to reset the password for your account. No changes have been made to your account yet.
                      </p>
                    </td>
                  </tr>

                  <!-- Button -->
                  <tr>
                    <td align="center" style="padding: 8px 0 24px 0;">
                      <table role="presentation" border="0" cellspacing="0" cellpadding="0">
                        <tr>
                          <td align="center" style="border-radius: 8px; background-color: #ea580c;">
                            <a href="{{ .ConfirmationURL }}" class="btn" style="display: inline-block; padding: 12px 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; color: #ffffff; font-weight: 600; text-decoration: none; border-radius: 8px; background-color: #ea580c;">
                              Reset your password
                            </a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>

                  <!-- Ignore Text -->
                  <tr>
                    <td align="center">
                      <p style="color: #9ca3af; font-size: 13px; line-height: 1.5; margin: 0;">
                        If you did not request this email, you can simply delete it. Your password will not change.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="background-color: #f9fafb; padding: 24px; text-align: center; border-top: 1px solid #f3f4f6; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;">
                <p style="color: #6b7280; font-size: 12px; margin: 0;">
                  &copy; 2024 Bachata Calendar London
                </p>
              </td>
            </tr>
            
          </table>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
