name: E2E Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke suite
        env:
          # Fallbacks when repo/environment secrets aren't reachable from this
          # workflow (e.g., env-scoped secrets + no `environment:` declaration).
          # The tests intercept all Supabase API calls via Playwright route
          # mocks; only the URL/key need to be non-empty + match the projectRef
          # the specs hardcode (`stsdtacfauprzrdebmzg`) so the localStorage
          # auth-token key the mocks set is what the supabase-js client reads.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://stsdtacfauprzrdebmzg.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIn0.e2e-test-placeholder-not-a-real-key' }}
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
