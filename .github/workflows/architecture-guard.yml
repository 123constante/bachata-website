name: Runtime Architecture Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  runtime-architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Source integrity (no null-byte corruption)
        run: npm run check:integrity

      - name: Enforce runtime architecture constraints
        run: npm run lint:architecture
