name: Source Integrity

# Production guardrail against Cowork-mount file corruption (null bytes,
# silent truncation, JSON/TS parse failures). Runs on every push and PR.
# Calls bin/check-integrity.sh which sha256-pins the guard before running.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make scripts executable
        run: chmod +x bin/*.sh

      - name: Run integrity guard (sealed wrapper)
        run: bin/check-integrity.sh
